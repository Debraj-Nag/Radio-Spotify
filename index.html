<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiofy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:white;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#090909;
padding:25px 20px;
border-right:1px solid rgba(255,255,255,0.06);
display:flex;
flex-direction:column;
}

.logo{
font-size:2rem;
font-weight:800;
margin-bottom:40px;
background:linear-gradient(90deg,#1db954,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu{
display:flex;
flex-direction:column;
gap:16px;
}

.menu-item{
padding:14px 16px;
border-radius:14px;
background:#121212;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

.menu-item:hover{
background:#1e1e1e;
transform:translateX(4px);
}

.main{
flex:1;
overflow-y:auto;
padding:30px;
padding-bottom:120px;
background:linear-gradient(180deg,#121212,#000);
}

.topbar{
display:flex;
gap:14px;
margin-bottom:28px;
}

.search{
flex:1;
padding:18px 22px;
border:none;
outline:none;
border-radius:999px;
background:#1e1e1e;
color:white;
font-size:1rem;
}

.search-btn{
padding:18px 28px;
border:none;
border-radius:999px;
background:#1db954;
color:black;
font-weight:800;
cursor:pointer;
transition:0.2s;
}

.search-btn:hover{
transform:scale(1.03);
}

.hero{
background:linear-gradient(135deg,#1db954,#065f46);
padding:40px;
border-radius:28px;
margin-bottom:30px;
}

.hero h1{
font-size:3rem;
margin-bottom:14px;
}

.hero p{
line-height:1.7;
max-width:700px;
}

.status{
margin-bottom:20px;
color:#1db954;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:22px;
}

.card{
background:#181818;
padding:18px;
border-radius:22px;
cursor:pointer;
transition:0.25s;
}

.card:hover{
background:#252525;
transform:translateY(-4px);
}

.card img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:18px;
margin-bottom:14px;
}

.song-title{
font-weight:700;
margin-bottom:6px;
}

.artist{
color:#b3b3b3;
font-size:0.92rem;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
height:90px;
background:#121212;
border-top:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
z-index:100;
}

.now-playing{
display:flex;
align-items:center;
gap:14px;
}

.now-playing img{
width:60px;
height:60px;
border-radius:12px;
object-fit:cover;
}

.track-info h4{
margin-bottom:5px;
}

.track-info p{
color:#b3b3b3;
font-size:0.9rem;
}

.controls{
display:flex;
align-items:center;
gap:12px;
}

.controls button{
width:52px;
height:52px;
border:none;
border-radius:50%;
background:#1db954;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.controls button:hover{
transform:scale(1.06);
}

iframe{
width:0;
height:0;
border:none;
}

.loading{
display:flex;
justify-content:center;
align-items:center;
padding:60px;
font-size:1.1rem;
color:#1db954;
}

@media(max-width:900px){

.sidebar{
display:none;
}

.hero h1{
font-size:2rem;
}

.player{
height:auto;
padding:15px;
flex-direction:column;
gap:12px;
align-items:flex-start;
}

body{
overflow:auto;
}

}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">Radiofy</div>

<div class="menu">
<div class="menu-item">🏠 Home</div>
<div class="menu-item">🔍 Search</div>
<div class="menu-item">❤️ Favorites</div>
<div class="menu-item">🔥 Trending</div>
<div class="menu-item">🌎 Discover</div>
</div>

</div>

<div class="main">

<div class="topbar">
<input
type="text"
id="searchInput"
class="search"
placeholder="Search songs, artists, albums..."
>

<button class="search-btn" onclick="searchSongs()">
Search
</button>
</div>

<div class="hero">
<h1>Play Music Instantly</h1>

<p>
Radiofy is a Spotify-inspired music streaming interface with instant song discovery,
beautiful album artwork, artist search, and embedded playback.
</p>
</div>

<div class="status" id="status"></div>

<div class="grid" id="results"></div>

</div>

</div>

<div class="player">

<div class="now-playing">

<img
id="playerImage"
src="https://placehold.co/100x100/png"
alt="cover"
>

<div class="track-info">
<h4 id="playerTitle">Nothing Playing</h4>
<p id="playerArtist">Search for a song</p>
</div>

</div>

<div class="controls">
<button onclick="pauseTrack()">⏸</button>
<button onclick="resumeTrack()">▶</button>
</div>

</div>

<div id="youtubeContainer"></div>

<script>

const results = document.getElementById('results');
const statusText = document.getElementById('status');

let currentPlayer = null;

async function searchSongs(){

const query = document.getElementById('searchInput').value.trim();

if(!query){
alert('Enter a song or artist name');
return;
}

results.innerHTML = `
<div class="loading">
Searching songs...
</div>
`;

statusText.innerText = '';

try{

const response = await fetch(
`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=30`
);

const data = await response.json();

results.innerHTML = '';

if(!data.results.length){

statusText.innerText = 'No songs found';
return;

}

statusText.innerText = `Found ${data.results.length} songs`;

for(const song of data.results){

const artwork = song.artworkUrl100
? song.artworkUrl100.replace('100x100','500x500')
: 'https://placehold.co/500x500/png';

const card = document.createElement('div');

card.className = 'card';

card.innerHTML = `
<img src="${artwork}" alt="cover">

<div class="song-title">
${song.trackName}
</div>

<div class="artist">
${song.artistName}
</div>
`;

card.addEventListener('click',()=>{
playSong(song);
});

results.appendChild(card);

}

}catch(error){

console.error(error);

results.innerHTML = '';

statusText.innerText = 'Error loading songs';

}

}

function playSong(song){

const artwork = song.artworkUrl100
? song.artworkUrl100.replace('100x100','500x500')
: 'https://placehold.co/500x500/png';

document.getElementById('playerTitle').innerText = song.trackName;
document.getElementById('playerArtist').innerText = song.artistName;
document.getElementById('playerImage').src = artwork;

const searchQuery = encodeURIComponent(
`${song.trackName} ${song.artistName}`
);

const embed = `
<iframe
id="ytplayer"
width="0"
height="0"
src="https://www.youtube.com/embed/videoseries?listType=search&list=${searchQuery}&autoplay=1&enablejsapi=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
`;

document.getElementById('youtubeContainer').innerHTML = embed;

currentPlayer = document.getElementById('ytplayer');

}

function pauseTrack(){

if(currentPlayer){

currentPlayer.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo","args":""}',
'*'
);

}

}

function resumeTrack(){

if(currentPlayer){

currentPlayer.contentWindow.postMessage(
'{"event":"command","func":"playVideo","args":""}',
'*'
);

}

}

document.getElementById('searchInput').addEventListener('keypress',(e)=>{

if(e.key==='Enter'){
searchSongs();
}

});

</script>

</body>
</html>
